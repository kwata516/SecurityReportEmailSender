openapi: 3.0.0
info:
  title: Security Report Email Sender
  description: >-
    Security Copilot の調査結果を Azure Logic App (Consumption) の HTTP Webhook 経由で
    メール送信するための API。Subject と Body を JSON ボディで受け渡す。
    Body には HTML をそのまま (URL エンコードせずに) 渡す。
  version: "1.0"
servers:
  # Logic App の HTTP トリガー callback URL のホスト部とワークフローパス。
  # デプロイ済み (cfs202512 / Central US) の callback URL から取得した値:
  #   REGION host : prod-26.centralus.logic.azure.com
  #   WORKFLOW-ID : dd5da077737d454898e329919934c095
  # 認証 (SAS の sig) は Security Copilot 側の ApiKey 認証 (QueryParams: sig) で付与する。
  - url: https://prod-26.centralus.logic.azure.com/workflows/dd5da077737d454898e329919934c095/triggers/manual/paths
paths:
  /invoke:
    post:
      operationId: SendSecurityReportEmail
      summary: 調査結果を HTML メールとして送信する
      description: |
        Security Copilot の調査結果を、あらかじめ Logic App 側で指定された宛先にメール送信する。
        Subject と Body を JSON で渡す。Body には HTML をそのまま渡す (URL エンコード不要)。
        #ExamplePrompts この調査結果をメールで送って
        #ExamplePrompts 上記のレポートをメールで送信して
        #ExamplePrompts Email this investigation summary to the SOC team
      parameters:
        # SAS の固定クエリ (api-version / sp / sv) は単一値の enum で「定数」として固定する。
        # default だけでは Security Copilot が送信せず 401 になるため、required + 単一 enum とし、
        # 必ずこの値が送信されるようにする。認証で付与される sig と合わせて完全な SAS URL を構成する。
        - in: query
          name: api-version
          required: true
          schema:
            type: string
            enum: ["2016-10-01"]
            default: "2016-10-01"
          description: Logic App トリガー API のバージョン。必ず 2016-10-01 を使用する。
        - in: query
          name: sp
          required: true
          schema:
            type: string
            enum: ["/triggers/manual/run"]
            default: "/triggers/manual/run"
          description: SAS で許可された操作。必ず /triggers/manual/run を使用する。
        - in: query
          name: sv
          required: true
          schema:
            type: string
            enum: ["1.0"]
            default: "1.0"
          description: SAS バージョン。必ず 1.0 を使用する。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - Subject
                - Body
              properties:
                Subject:
                  type: string
                  description: >-
                    メールの件名。HTML を含まないプレーンテキストを推奨。
                Body:
                  type: string
                  description: >-
                    メール本文 (HTML)。HTML をそのまま渡す (URL エンコード不要)。
                    JSON 文字列として送信されるため HTML タグはそのまま保持される。
                    例: '<h1>Report</h1><p>本文</p>'
      responses:
        "200":
          description: メール送信成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
        "500":
          description: メール送信失敗
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: failure
                  message:
                    type: string
