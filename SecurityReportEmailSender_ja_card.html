<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Security Copilot プラグインカード</title>
  <style>
    :root {
      --primary: #0078D4;
      --primary-dark: #005A9E;
      --accent: #50E6FF;
      --bg: #F5F5F5;
      --card-bg: #FFFFFF;
      --text: #323130;
      --text-secondary: #605E5C;
      --border: #E1DFDD;
      --badge-kql: #0E7A0D;
      --badge-api: #C239B3;
      --badge-gpt: #E74C3C;
      --badge-logicapp: #0072C6;
      --badge-mcp: #FF8C00;
      --badge-agent: #107C10;
      --badge-none: #605E5C;
      --badge-apikey: #8764B8;
      --badge-basic: #CA5010;
      --badge-aad: #0078D4;
      --badge-oauth: #038387;
      --shadow: 0 2px 8px rgba(0,0,0,0.08);
      --shadow-lg: 0 4px 16px rgba(0,0,0,0.12);
      --radius: 8px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', 'Yu Gothic UI', 'Meiryo', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      padding: 32px;
    }

    .container { max-width: 960px; margin: 0 auto; }

    .plugin-header {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: white;
      padding: 32px 40px;
      border-radius: var(--radius) var(--radius) 0 0;
      position: relative;
      overflow: hidden;
    }
    .plugin-header::after {
      content: '';
      position: absolute;
      top: -40px; right: -40px;
      width: 200px; height: 200px;
      background: rgba(255,255,255,0.05);
      border-radius: 50%;
    }
    .plugin-header .type-label {
      display: inline-block;
      background: rgba(255,255,255,0.2);
      padding: 4px 14px;
      border-radius: 20px;
      font-size: 12px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 1px;
      margin-bottom: 12px;
    }
    .plugin-header h1 { font-size: 28px; font-weight: 700; margin-bottom: 4px; }
    .plugin-header .internal-name {
      font-size: 13px; opacity: 0.75;
      font-family: 'Cascadia Code', 'Fira Code', monospace;
      margin-bottom: 12px;
    }
    .plugin-header .description { font-size: 15px; opacity: 0.9; max-width: 700px; }

    .meta-bar {
      background: var(--card-bg);
      border-left: 1px solid var(--border); border-right: 1px solid var(--border);
      padding: 16px 40px;
      display: flex; gap: 32px; flex-wrap: wrap; align-items: center;
      border-bottom: 1px solid var(--border);
    }
    .meta-item { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-secondary); }
    .meta-item strong { color: var(--text); font-weight: 600; }
    .meta-item .icon { width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; }

    .auth-badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 10px; border-radius: 12px;
      font-size: 12px; font-weight: 600; color: white;
    }
    .auth-none { background: var(--badge-none); }
    .auth-apikey { background: var(--badge-apikey); }
    .auth-basic { background: var(--badge-basic); }
    .auth-aad, .auth-aaddelegated { background: var(--badge-aad); }
    .auth-oauth { background: var(--badge-oauth); }

    .content {
      background: var(--card-bg);
      border-left: 1px solid var(--border); border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      border-radius: 0 0 var(--radius) var(--radius);
      padding: 32px 40px;
    }

    .section-title {
      font-size: 18px; font-weight: 700; color: var(--primary);
      margin-bottom: 16px;
      display: flex; align-items: center; gap: 8px;
      padding-bottom: 8px; border-bottom: 2px solid var(--primary);
    }

    .skill-group { margin-bottom: 28px; }
    .skill-group-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
    .format-badge {
      display: inline-block; padding: 4px 12px; border-radius: 4px;
      font-size: 12px; font-weight: 700; color: white;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .format-kql { background: var(--badge-kql); }
    .format-api { background: var(--badge-api); }
    .format-gpt { background: var(--badge-gpt); }
    .format-logicapp { background: var(--badge-logicapp); }
    .format-mcp { background: var(--badge-mcp); }
    .format-agent { background: var(--badge-agent); }
    .skill-group-header .group-info { font-size: 13px; color: var(--text-secondary); }

    .skill-card {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px 20px; margin-bottom: 10px;
      transition: box-shadow 0.2s ease;
    }
    .skill-card:hover { box-shadow: var(--shadow); }
    .skill-card .skill-name { font-size: 15px; font-weight: 600; color: var(--text); }
    .skill-card .skill-internal {
      font-size: 12px; color: var(--text-secondary);
      font-family: 'Cascadia Code', 'Fira Code', monospace; margin-bottom: 6px;
    }
    .skill-card .skill-desc { font-size: 13px; color: var(--text-secondary); margin-bottom: 10px; }

    .inputs-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 8px; }
    .inputs-table th {
      text-align: left; padding: 6px 10px; background: var(--card-bg);
      border-bottom: 2px solid var(--border); color: var(--text-secondary);
      font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px;
    }
    .inputs-table td { padding: 6px 10px; border-bottom: 1px solid var(--border); vertical-align: top; }
    .inputs-table .param-name {
      font-family: 'Cascadia Code', 'Fira Code', monospace;
      font-weight: 600; color: var(--primary-dark); white-space: nowrap;
    }
    .required-marker { color: #D13438; font-weight: 700; margin-left: 2px; }
    .default-value {
      font-family: 'Cascadia Code', 'Fira Code', monospace; font-size: 12px;
      background: #E8F0FE; padding: 1px 6px; border-radius: 3px;
    }

    .agent-section { margin-top: 28px; }
    .agent-info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
    .agent-info-item {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px 18px;
    }
    .agent-info-item .label {
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px;
      color: var(--text-secondary); font-weight: 600; margin-bottom: 4px;
    }
    .agent-info-item .value { font-size: 14px; color: var(--text); font-weight: 500; }

    .child-skills-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
    .child-skill-tag {
      background: #E8F0FE; color: var(--primary-dark);
      padding: 4px 12px; border-radius: 16px;
      font-size: 13px; font-weight: 500;
      font-family: 'Cascadia Code', 'Fira Code', monospace;
      border: 1px solid #C7DDFB;
    }

    .prompts-list { margin-top: 12px; }
    .prompt-item {
      background: var(--bg); border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: 0 var(--radius) var(--radius) 0;
      padding: 10px 16px; margin-bottom: 8px;
      font-size: 14px; color: var(--text);
    }
    .prompt-item.starter { border-left-color: var(--primary); }
    .prompt-item .prompt-label {
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      color: var(--text-secondary); margin-bottom: 2px;
    }

    .card-footer {
      text-align: center; padding: 20px;
      font-size: 12px; color: var(--text-secondary); margin-top: 8px;
    }
    .card-footer a { color: var(--primary); text-decoration: none; }

    @media (max-width: 680px) {
      body { padding: 12px; }
      .plugin-header, .meta-bar, .content { padding-left: 20px; padding-right: 20px; }
      .agent-info-grid { grid-template-columns: 1fr; }
      .meta-bar { flex-direction: column; gap: 12px; align-items: flex-start; }
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>

<div class="container">

  <script>
    const PLUGIN_DATA = {
      type: "Agent",
      name: "SecurityReportEmailSender",
      displayName: "Security Report Email Sender",
      description: "Security Copilot の調査結果を HTML メールに整形し、Azure Logic App (Webhook) 経由で外部のメールアドレスへ送信するエージェント。Security Copilot 側ではエージェント (GPT) として動作し、結果を HTML に整形して API 子スキルを呼び出し Logic App を実行する。HTML は URL エンコードせずそのまま渡され、Office 365 Outlook の Send an email (V2) で配信される。宛先・送信元は Logic App 側で固定。認証は SAS トークンを使用 (OAuth 2.0 対応は今後予定)。",
      auth: {
        type: "ApiKey",
        details: "sig (SAS 署名) を QueryParams で付与"
      },

      skillGroups: [
        {
          format: "Agent",
          skills: [
            {
              name: "SendInvestigationReportByEmail",
              displayName: "Send Investigation Report by Email",
              description: "調査結果を HTML メールに整形し、API 子スキルを呼び出して Logic App を実行し配信する。宛先・送信元は Logic App 側で固定。",
              inputs: [
                { name: "ReportContent", description: "メールで送信する調査結果の本文。直前の Security Copilot セッションの出力や、ユーザーが指定したテキストを渡す。", required: true, defaultValue: "" },
                { name: "Subject", description: "メールの件名 (任意)。省略時はエージェントが調査結果の内容から件名を生成する。", required: false, defaultValue: "" }
              ]
            }
          ]
        },
        {
          format: "API",
          skills: [
            {
              name: "SendSecurityReportEmail",
              displayName: "Send Security Report Email",
              description: "調査結果を HTML メールとして送信する API 子スキル。Subject と Body (生の HTML) を JSON で渡し、Logic App の Webhook を呼び出す。",
              inputs: [
                { name: "Subject", description: "メールの件名 (プレーンテキスト)", required: true, defaultValue: "" },
                { name: "Body", description: "メール本文 (生の HTML。そのまま渡す)", required: true, defaultValue: "" },
                { name: "api-version", description: "Logic App トリガーの API バージョン (単一値 enum で固定)", required: true, defaultValue: "2016-10-01" },
                { name: "sp", description: "SAS で許可された操作 (単一値 enum で固定)", required: true, defaultValue: "/triggers/manual/run" },
                { name: "sv", description: "SAS バージョン (単一値 enum で固定)", required: true, defaultValue: "1.0" }
              ]
            }
          ]
        }
      ],

      agent: {
        name: "SecurityReportEmailSender",
        displayName: "Security Report Email Sender",
        publisher: "Custom",
        model: "gpt-4.1",
        constraint: "None",
        triggerName: "Default",
        pollPeriod: "0",
        fetchSkill: "",
        processSkill: "SecurityReportEmailSender.SendInvestigationReportByEmail",
        promptSkill: "",
        childSkills: ["SendSecurityReportEmail"],
        requiredSkillsets: ["SecurityReportEmailSender"],
        suggestedPrompts: []
      }
    };
  </script>

  <!-- ヘッダー -->
  <div class="plugin-header" id="pluginHeader">
    <div class="type-label" id="typeLabel"></div>
    <h1 id="displayName"></h1>
    <div class="internal-name" id="internalName"></div>
    <div class="description" id="headerDesc"></div>
  </div>

  <!-- メタ情報バー -->
  <div class="meta-bar" id="metaBar">
    <div class="meta-item">
      <span class="icon">&#x1f527;</span>
      <span>スキル数: <strong id="skillCount">0</strong></span>
    </div>
    <div class="meta-item">
      <span class="icon">&#x1f4e6;</span>
      <span>スキルグループ: <strong id="groupCount">0</strong></span>
    </div>
    <div class="meta-item">
      <span class="icon">&#x1f4d0;</span>
      <span>フォーマット: <strong id="formatsList"></strong></span>
    </div>
    <div class="meta-item" id="authItem">
      <span class="icon">&#x1f512;</span>
      <span>認証: </span>
      <span class="auth-badge" id="authBadge"></span>
    </div>
  </div>

  <!-- コンテンツ -->
  <div class="content">

    <!-- スキルグループ -->
    <div id="skillGroupsSection">
      <div class="section-title">
        <span>&#x26a1;</span> スキル
      </div>
      <div id="skillGroupsContainer"></div>
    </div>

    <!-- エージェント設定 -->
    <div id="agentSection" class="agent-section hidden">
      <div class="section-title">
        <span>&#x1f916;</span> エージェント構成
      </div>

      <div class="agent-info-grid" id="agentInfoGrid"></div>

      <div id="childSkillsBlock" class="hidden" style="margin-top: 16px;">
        <h4 style="font-size: 14px; color: var(--text-secondary); margin-bottom: 8px;">子スキル</h4>
        <div class="child-skills-list" id="childSkillsList"></div>
      </div>

      <div id="requiredSkillsetsBlock" class="hidden" style="margin-top: 16px;">
        <h4 style="font-size: 14px; color: var(--text-secondary); margin-bottom: 8px;">必須スキルセット</h4>
        <div class="child-skills-list" id="requiredSkillsetsList"></div>
      </div>

      <div id="suggestedPromptsBlock" class="hidden" style="margin-top: 20px;">
        <h4 style="font-size: 14px; color: var(--text-secondary); margin-bottom: 8px;">推奨プロンプト</h4>
        <div class="prompts-list" id="suggestedPromptsList"></div>
      </div>
    </div>

  </div>

  <!-- フッター -->
  <div class="card-footer">
    <strong>Security Copilot Custom Plugins Builder</strong> により生成
    &mdash; <a href="https://learn.microsoft.com/ja-jp/copilot/security/custom-plugins" target="_blank">ドキュメント</a>
  </div>

</div>

<script>
(function () {
  const d = PLUGIN_DATA;

  document.getElementById('typeLabel').textContent = d.type;
  document.getElementById('displayName').textContent = d.displayName || d.name;
  document.getElementById('internalName').textContent = d.name;
  document.getElementById('headerDesc').textContent = d.description;

  const totalSkills = d.skillGroups.reduce((sum, g) => sum + g.skills.length, 0);
  document.getElementById('skillCount').textContent = totalSkills;
  document.getElementById('groupCount').textContent = d.skillGroups.length;

  const formats = [...new Set(d.skillGroups.map(g => g.format))];
  document.getElementById('formatsList').textContent = formats.join(', ');

  const authType = (d.auth.type || 'None').replace(/\s+/g, '');
  const authBadge = document.getElementById('authBadge');
  authBadge.textContent = d.auth.type + (d.auth.details ? ' \u2014 ' + d.auth.details : '');
  authBadge.classList.add('auth-' + authType.toLowerCase()
    .replace('oauthauthorizationcodeflow', 'oauth')
    .replace('oauthclientcredentialsflow', 'oauth'));

  const container = document.getElementById('skillGroupsContainer');
  d.skillGroups.forEach(group => {
    const div = document.createElement('div');
    div.className = 'skill-group';

    const header = document.createElement('div');
    header.className = 'skill-group-header';
    const badge = document.createElement('span');
    badge.className = 'format-badge format-' + group.format.toLowerCase();
    badge.textContent = group.format;
    header.appendChild(badge);
    const info = document.createElement('span');
    info.className = 'group-info';
    info.textContent = group.skills.length + ' 個のスキル';
    header.appendChild(info);
    div.appendChild(header);

    group.skills.forEach(skill => {
      const card = document.createElement('div');
      card.className = 'skill-card';
      card.innerHTML =
        '<div class="skill-name">' + esc(skill.displayName || skill.name) + '</div>' +
        '<div class="skill-internal">' + esc(skill.name) + '</div>' +
        (skill.description ? '<div class="skill-desc">' + esc(skill.description) + '</div>' : '');

      if (skill.inputs && skill.inputs.length > 0) {
        let table = '<table class="inputs-table">' +
          '<thead><tr><th>パラメーター</th><th>説明</th><th>必須</th><th>既定値</th></tr></thead><tbody>';
        skill.inputs.forEach(inp => {
          table += '<tr>' +
            '<td class="param-name">' + esc(inp.name) + (inp.required ? '<span class="required-marker">*</span>' : '') + '</td>' +
            '<td>' + esc(inp.description || '') + '</td>' +
            '<td>' + (inp.required ? 'はい' : 'いいえ') + '</td>' +
            '<td>' + (inp.defaultValue ? '<span class="default-value">' + esc(inp.defaultValue) + '</span>' : '\u2014') + '</td>' +
          '</tr>';
        });
        table += '</tbody></table>';
        card.innerHTML += table;
      }
      div.appendChild(card);
    });
    container.appendChild(div);
  });

  if (d.type.toLowerCase().includes('agent') && d.agent && d.agent.name) {
    document.getElementById('agentSection').classList.remove('hidden');

    const grid = document.getElementById('agentInfoGrid');
    const agentFields = [
      ['エージェント名', d.agent.displayName || d.agent.name],
      ['内部名', d.agent.name],
      ['発行元', d.agent.publisher],
      ['モデル', d.agent.model],
      ['制約', d.agent.constraint],
      ['トリガー', d.agent.triggerName],
      ['ポーリング間隔', d.agent.pollPeriod ? d.agent.pollPeriod + ' 秒' : ''],
      ['Fetch スキル', d.agent.fetchSkill],
      ['Process スキル', d.agent.processSkill],
      ['Prompt スキル', d.agent.promptSkill]
    ].filter(function(f) { return f[1]; });

    agentFields.forEach(function(f) {
      var item = document.createElement('div');
      item.className = 'agent-info-item';
      item.innerHTML = '<div class="label">' + esc(f[0]) + '</div><div class="value">' + esc(f[1]) + '</div>';
      grid.appendChild(item);
    });

    if (d.agent.childSkills && d.agent.childSkills.length > 0) {
      document.getElementById('childSkillsBlock').classList.remove('hidden');
      var list = document.getElementById('childSkillsList');
      d.agent.childSkills.forEach(function(cs) {
        var tag = document.createElement('span');
        tag.className = 'child-skill-tag';
        tag.textContent = cs;
        list.appendChild(tag);
      });
    }

    if (d.agent.requiredSkillsets && d.agent.requiredSkillsets.length > 0) {
      document.getElementById('requiredSkillsetsBlock').classList.remove('hidden');
      var rlist = document.getElementById('requiredSkillsetsList');
      d.agent.requiredSkillsets.forEach(function(rs) {
        var tag = document.createElement('span');
        tag.className = 'child-skill-tag';
        tag.textContent = rs;
        rlist.appendChild(tag);
      });
    }
  }

  function esc(str) {
    var el = document.createElement('span');
    el.textContent = str || '';
    return el.innerHTML;
  }
})();
</script>

</body>
</html>
